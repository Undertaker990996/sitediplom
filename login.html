<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - БКРБ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a5c7e 0%, #17a2b8 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .login-card h2 {
            color: #0a5c7e;
            text-align: center;
            margin-bottom: 10px;
        }
        .login-card .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-control {
            border-radius: 30px;
            padding: 12px 20px;
            border: 1px solid #ddd;
        }
        .form-control:focus {
            border-color: #0a5c7e;
            box-shadow: 0 0 0 0.2rem rgba(10,92,126,0.25);
        }
        .btn-login {
            background: #0a5c7e;
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            color: white;
        }
        .btn-login:hover {
            background: #084a66;
        }
        .role-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            margin: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .role-badge:hover {
            transform: scale(1.05);
        }
        .role-admin { background: #dc3545; color: white; }
        .role-manager { background: #fd7e14; color: white; }
        .role-user { background: #28a745; color: white; }
        .test-data {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="login-card">
        <div class="text-center">
            <i class="fas fa-hospital fa-3x" style="color: #0a5c7e;"></i>
        </div>
        <h2>🏥 БКРБ</h2>
        <div class="subtitle">Вход в личный кабинет</div>
        
        <form id="loginForm">
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" id="email" class="form-control border-start-0" placeholder="Email" required>
                </div>
            </div>
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" id="password" class="form-control border-start-0" placeholder="Пароль" required>
                </div>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt me-2"></i> Войти</button>
        </form>
        
        <div class="test-data">
            <div class="text-center mb-2"><strong><i class="fas fa-info-circle"></i> Тестовые данные</strong></div>
            <div class="row text-center">
                <div class="col-4">
                    <div class="role-badge role-admin" onclick="fillAdmin()">👑 Админ</div>
                </div>
                <div class="col-4">
                    <div class="role-badge role-manager" onclick="fillManager()">📋 Менеджер</div>
                </div>
                <div class="col-4">
                    <div class="role-badge role-user" onclick="fillUser()">👤 Пациент</div>
                </div>
            </div>
            <div class="text-center mt-2">
                <small class="text-muted">Пароль для всех: <strong>123456</strong></small>
            </div>
        </div>
    </div>

    <script>
        function fillAdmin() {
            document.getElementById('email').value = 'admin@bkrb.ru';
            document.getElementById('password').value = '123456';
        }
        function fillManager() {
            document.getElementById('email').value = 'manager@bkrb.ru';
            document.getElementById('password').value = '123456';
        }
        function fillUser() {
            document.getElementById('email').value = 'ivan@mail.ru';
            document.getElementById('password').value = '123456';
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Демо-проверка (для статического HTML)
            if (email === 'admin@bkrb.ru' && password === '123456') {
                window.location.href = 'dashboard-admin.html';
            } else if (email === 'manager@bkrb.ru' && password === '123456') {
                window.location.href = 'dashboard-manager.html';
            } else if (email === 'ivan@mail.ru' && password === '123456') {
                window.location.href = 'dashboard-user.html';
            } else {
                alert('Неверный email или пароль');
            }
        });
    </script>
</body>
</html>
